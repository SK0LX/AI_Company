# AI Office — production deploy WITHOUT a public TLS proxy (host's 80/443 are
# already taken by another service). The bots reach Telegram over OUTBOUND
# connections, so no inbound port is needed for them. The dashboard is published
# on 127.0.0.1 only — reach it over an SSH tunnel:
#     ssh -L 8100:127.0.0.1:8100 root@<host>   then open http://localhost:8100
#
#     docker compose -f docker-compose.prod.yml up -d --build
services:
  aiagents:
    build: .
    image: aiagents:latest
    restart: unless-stopped
    env_file:
      - .env                          # secrets: ANTHROPIC_API_KEY, TELEGRAM_BOT_TOKEN, API_TOKEN, …
    environment:
      ADMIN_HOST: "0.0.0.0"           # listen inside the container; host-published on 127.0.0.1 below
      ADMIN_PORT: "8100"
      WORKSPACE_DIR: /app/workspace
      WIKI_DIR: /app/wiki
      DB_PATH: /app/data/memory.sqlite
      DB_SYNCHRONOUS: "FULL"          # fsync each commit — survive a host/power crash
    volumes:
      - ./data:/app/data              # bind-mount: brings the existing agents + secret.key over
      - aiagents_workspace:/app/workspace
      - aiagents_wiki:/app/wiki
    ports:
      - "127.0.0.1:8100:8100"         # dashboard local-only (SSH-tunnel to reach it)
    mem_limit: 1200m                  # leave headroom on a 1.6 GiB box
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  aiagents_workspace:
  aiagents_wiki:
