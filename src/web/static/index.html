<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI IT Company — Админка</title>
  <style>
    :root { --bg:#0f1115; --panel:#181b22; --line:#2a2f3a; --text:#e6e8ec;
            --muted:#9aa3b2; --accent:#4f8cff; --danger:#ff5c5c; --ok:#3ecf8e; --warn:#f0b429; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
           background:var(--bg); color:var(--text); }
    header { padding:16px 24px; border-bottom:1px solid var(--line);
             display:flex; align-items:center; justify-content:space-between; gap:16px; }
    h1 { font-size:18px; margin:0; }
    h3 { margin:22px 0 10px; font-size:15px; }
    .muted { color:var(--muted); }
    main { padding:20px 24px; max-width:1200px; margin:0 auto; }
    button { font:inherit; cursor:pointer; border:1px solid var(--line);
             background:var(--panel); color:var(--text); padding:7px 12px; border-radius:8px; }
    button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    button.danger { color:var(--danger); }
    .tabs { display:flex; gap:6px; }
    .tab { padding:7px 14px; border-radius:8px; border:1px solid transparent; color:var(--muted); }
    .tab.active { color:var(--text); border-color:var(--line); background:var(--panel); }
    .hidden { display:none; }
    table { width:100%; border-collapse:collapse; margin-top:8px; }
    th,td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; }
    .pill { display:inline-block; padding:1px 8px; border-radius:999px; font-size:12px;
            border:1px solid var(--line); margin:2px 4px 2px 0; color:var(--muted); }
    .badge-on { color:var(--ok); } .badge-off { color:var(--muted); }
    .row-actions button { padding:5px 9px; margin-left:6px; }
    /* board */
    .board { display:grid; grid-template-columns:repeat(6, 1fr); gap:10px; align-items:start; }
    .col { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px; min-height:60px; }
    .col h4 { margin:4px 6px 10px; font-size:12px; text-transform:uppercase; color:var(--muted);
              display:flex; justify-content:space-between; }
    .card { background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:9px 10px;
            margin-bottom:8px; cursor:pointer; }
    .card:hover { border-color:var(--accent); }
    .card .t { font-size:13px; margin-bottom:6px; word-break:break-word; }
    .card .meta { font-size:11px; color:var(--muted); display:flex; gap:8px; flex-wrap:wrap; }
    .live { display:flex; align-items:center; gap:7px; color:var(--muted); font-size:12px; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); }
    .dot.on { background:var(--ok); } .dot.off { background:var(--danger); }
    #graph { width:100%; height:420px; background:var(--panel); border:1px solid var(--line); border-radius:10px; }
    .gnode { fill:var(--bg); stroke:var(--line); }
    .gnode.ceo { stroke:var(--accent); }
    .glabel { fill:var(--text); font-size:11px; }
    .gedge { stroke:var(--muted); opacity:.5; }
    .gedge-label { fill:var(--muted); font-size:10px; }
    /* modal + drawer */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
               align-items:flex-start; justify-content:center; overflow:auto; padding:40px 16px; }
    .overlay.open { display:flex; }
    .modal { background:var(--panel); border:1px solid var(--line); border-radius:14px;
             width:680px; max-width:100%; padding:22px; }
    .field { margin-bottom:14px; }
    label { display:block; color:var(--muted); margin-bottom:5px; font-size:13px; }
    input[type=text], textarea, select { width:100%; background:var(--bg); color:var(--text);
            border:1px solid var(--line); border-radius:8px; padding:9px 11px; font:inherit; }
    textarea { resize:vertical; min-height:90px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .perms { display:flex; flex-wrap:wrap; gap:14px; }
    .perms label { display:flex; align-items:center; gap:7px; color:var(--text); }
    .modal-actions { display:flex; justify-content:space-between; margin-top:18px; }
    .err { color:var(--danger); min-height:18px; }
    .tl { list-style:none; padding:0; margin:0; }
    .tl li { padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; }
    .tl .ty { color:var(--accent); font-weight:600; margin-right:6px; }
    .tl .who { color:var(--muted); }
    /* activity feed */
    .filters { display:flex; gap:6px; }
    .filt { padding:6px 12px; border-radius:999px; color:var(--muted); }
    .filt.active { color:var(--text); border-color:var(--accent); }
    .feed { display:flex; flex-direction:column; gap:8px; }
    .fi { display:flex; gap:12px; align-items:flex-start; background:var(--panel);
          border:1px solid var(--line); border-left:3px solid var(--line);
          border-radius:8px; padding:10px 12px; }
    .fi.tasks { border-left-color:var(--accent); }
    .fi.thoughts { border-left-color:#a06bff; }
    .fi.system { border-left-color:var(--warn); }
    .fi .ico { font-size:16px; line-height:1.4; }
    .fi .body { flex:1; min-width:0; }
    .fi .head { display:flex; gap:8px; align-items:baseline; flex-wrap:wrap; }
    .fi .who { font-weight:600; }
    .fi .verb { color:var(--muted); }
    .fi .txt { margin-top:2px; word-break:break-word; }
    .fi .when { color:var(--muted); font-size:11px; white-space:nowrap; }
    /* office map */
    .office { display:flex; gap:14px; align-items:stretch; }
    .office-canvas { flex:2; min-width:0; background:radial-gradient(120% 120% at 50% 0%, #141a2b 0%, #0c0f17 70%);
                     border:1px solid var(--line); border-radius:14px; padding:6px; }
    #office { width:100%; height:auto; display:block; }
    .office-side { flex:1; min-width:240px; max-width:360px; background:var(--panel);
                   border:1px solid var(--line); border-radius:14px; padding:14px; overflow:auto; max-height:572px; }
    .office-side .fi { background:var(--bg); }
    .onode-name { fill:var(--text); font-size:12px; font-weight:600; }
    .onode-role { fill:var(--muted); font-size:10px; }
    .onode-init { fill:#fff; font-size:15px; font-weight:700; }
    .oedge { stroke:#4a5570; }
    @media (max-width:860px) { .office { flex-direction:column; } .office-side { max-width:none; } }
  </style>
</head>
<body>
  <header>
    <div style="display:flex; align-items:center; gap:18px">
      <h1>🏢 AI IT Company</h1>
      <nav class="tabs">
        <button class="tab active" id="tab-agents" onclick="showView('agents')">Агенты</button>
        <button class="tab" id="tab-office" onclick="showView('office')">Офис</button>
        <button class="tab" id="tab-board" onclick="showView('board')">Доска</button>
        <button class="tab" id="tab-activity" onclick="showView('activity')">Активность</button>
      </nav>
    </div>
    <div style="display:flex; align-items:center; gap:14px">
      <span class="live"><span class="dot off" id="liveDot"></span><span id="liveTxt">offline</span></span>
      <button class="primary" id="addBtn" onclick="openForm()">+ Добавить агента</button>
    </div>
  </header>
  <main>
    <!-- AGENTS -->
    <section id="view-agents">
      <span class="muted" id="count"></span>
      <table>
        <thead><tr>
          <th>slug</th><th>Имя</th><th>Роль</th><th>Модель</th>
          <th>Права</th><th>Статус</th><th></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <!-- BOARD -->
    <section id="view-board" class="hidden">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <span class="muted" id="taskCount"></span>
        <button onclick="loadBoard(); loadGraph()">↻ Обновить</button>
      </div>
      <div class="board" id="board"></div>
      <h3>Граф взаимодействий <span class="muted" style="font-weight:400">— делегирования между агентами</span></h3>
      <svg id="graph" viewBox="0 0 1000 420" preserveAspectRatio="xMidYMid meet"></svg>
    </section>

    <!-- ACTIVITY -->
    <section id="view-activity" class="hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
        <div class="filters">
          <button class="filt active" data-cat="all" onclick="setCat('all')">Все</button>
          <button class="filt" data-cat="tasks" onclick="setCat('tasks')">Задачи</button>
          <button class="filt" data-cat="thoughts" onclick="setCat('thoughts')">Сознания</button>
          <button class="filt" data-cat="system" onclick="setCat('system')">Система</button>
        </div>
        <button onclick="loadActivity()">↻ Обновить</button>
      </div>
      <div class="feed" id="feed"></div>
    </section>

    <!-- OFFICE MAP -->
    <section id="view-office" class="hidden">
      <div class="office">
        <div class="office-canvas">
          <svg id="office" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <aside class="office-side">
          <h4 style="margin:0 0 10px; color:var(--muted); font-size:12px; text-transform:uppercase">Активность офиса</h4>
          <div class="feed" id="officeFeed"></div>
        </aside>
      </div>
    </section>
  </main>

  <!-- agent form -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="formTitle" style="margin-top:0">Новый агент</h2>
      <div class="err" id="formErr"></div>
      <div class="grid2">
        <div class="field"><label>slug (уникальный ключ)</label>
          <input type="text" id="f_slug" placeholder="например, devops"></div>
        <div class="field"><label>Имя</label>
          <input type="text" id="f_name" placeholder="DevOps-инженер"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Роль (role)</label>
          <input type="text" id="f_role" placeholder="devops"></div>
        <div class="field"><label>Модель (пусто = дефолт провайдера)</label>
          <input type="text" id="f_model" placeholder=""></div>
      </div>
      <div class="field"><label>Системный промпт</label>
        <textarea id="f_prompt" placeholder="You are a senior ..."></textarea></div>
      <div class="field"><label>Обязанности (одной строкой)</label>
        <input type="text" id="f_obligation" placeholder="За что отвечает"></div>
      <div class="field"><label>Права</label>
        <div class="perms">
          <label><input type="checkbox" id="p_can_edit_files"> can_edit_files</label>
          <label><input type="checkbox" id="p_can_run_shell"> can_run_shell</label>
          <label><input type="checkbox" id="p_can_edit_others_code"> can_edit_others_code</label>
          <label><input type="checkbox" id="p_can_modify_agents"> can_modify_agents</label>
          <label><input type="checkbox" id="p_proactive"> proactive</label>
        </div></div>
      <div class="grid2">
        <div class="field"><label>delegate_to (через запятую или *)</label>
          <input type="text" id="f_delegate" placeholder="* или developer,frontend"></div>
        <div class="field"><label>Telegram username (опц.)</label>
          <input type="text" id="f_tg_user" placeholder="@my_bot"></div>
      </div>
      <div class="field"><label>Telegram token (опц., хранится в БД)</label>
        <input type="text" id="f_tg_token" placeholder=""></div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;color:var(--text)">
        <input type="checkbox" id="f_enabled" checked> включён</label></div>
      <div class="modal-actions">
        <button class="danger" id="deleteBtn" style="display:none" onclick="onDelete()">Удалить</button>
        <div>
          <button onclick="closeForm()">Отмена</button>
          <button class="primary" onclick="onSave()">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- task timeline drawer -->
  <div class="overlay" id="drawer" onclick="if(event.target===this)closeDrawer()">
    <div class="modal">
      <h2 id="tlTitle" style="margin-top:0">Задача</h2>
      <div class="muted" id="tlMeta" style="margin-bottom:12px"></div>
      <ul class="tl" id="tlList"></ul>
      <div class="modal-actions"><span></span><button onclick="closeDrawer()">Закрыть</button></div>
    </div>
  </div>

<script>
const API = '/api/agents';
let editingSlug = null;

const $ = (id) => document.getElementById(id);
const esc = (s) => (s==null?'':String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// ---- view switching --------------------------------------------------------
let curView = 'agents';
function showView(v) {
  curView = v;
  $('view-agents').classList.toggle('hidden', v !== 'agents');
  $('view-office').classList.toggle('hidden', v !== 'office');
  $('view-board').classList.toggle('hidden', v !== 'board');
  $('view-activity').classList.toggle('hidden', v !== 'activity');
  $('tab-agents').classList.toggle('active', v === 'agents');
  $('tab-office').classList.toggle('active', v === 'office');
  $('tab-board').classList.toggle('active', v === 'board');
  $('tab-activity').classList.toggle('active', v === 'activity');
  $('addBtn').style.visibility = v === 'agents' ? 'visible' : 'hidden';
  if (v === 'board') { loadBoard(); loadGraph(); }
  if (v === 'activity') loadActivity();
  if (v === 'office') loadOffice();
}

// ---- office map ------------------------------------------------------------
function hueOf(s) { let h = 0; for (const c of s) h = (h * 31 + c.charCodeAt(0)) % 360; return h; }
function initials(name) {
  return (name || '?').trim().split(/\s+/).map(w => w[0] || '').join('').slice(0, 2).toUpperCase();
}
async function loadOffice() {
  let data = {nodes:[], edges:[]};
  try { data = await (await fetch('/api/office')).json(); } catch(e) {}
  const W = 1000, H = 600, cx = W/2, cy = H/2, RX = 390, RY = 230;
  const nodes = data.nodes || [];
  const pos = {};
  nodes.forEach((n, i) => {
    const a = (i / Math.max(1, nodes.length)) * 2*Math.PI - Math.PI/2;
    pos[n.slug] = { x: cx + RX*Math.cos(a), y: cy + RY*Math.sin(a) };
  });
  const maxc = Math.max(1, ...(data.edges||[]).map(e => e.count));
  const edges = (data.edges||[]).map(e => {
    const a = pos[e.from], b = pos[e.to]; if (!a||!b) return '';
    const w = 1 + 4*(e.count/maxc);
    return `<line class="oedge" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
            stroke-width="${w.toFixed(1)}" opacity="0.45" marker-end="url(#oarrow)"/>`;
  }).join('');
  const cells = nodes.map(n => {
    const p = pos[n.slug]; const h = hueOf(n.slug);
    const fill = n.enabled ? `hsl(${h} 55% 45%)` : '#2a2f3a';
    const dot = n.busy ? 'var(--ok)' : (n.enabled ? 'var(--muted)' : 'var(--danger)');
    const pulse = n.busy ? `
      <circle cx="${p.x}" cy="${p.y}" r="30" fill="none" stroke="hsl(${h} 70% 55%)" stroke-width="2">
        <animate attributeName="r" values="30;46" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="1.8s" repeatCount="indefinite"/>
      </circle>` : '';
    const ring = n.slug === 'ceo' ? `<circle cx="${p.x}" cy="${p.y}" r="33" fill="none" stroke="var(--accent)" stroke-width="2"/>` : '';
    const task = n.busy && n.current_task
      ? `<title>${esc(n.name)} — ${esc(n.current_task)}</title>` : `<title>${esc(n.name)}</title>`;
    return `<g style="cursor:default" opacity="${n.enabled ? 1 : 0.5}">${task}
      ${pulse}${ring}
      <circle cx="${p.x}" cy="${p.y}" r="28" fill="${fill}" stroke="#0c0f17" stroke-width="2"/>
      <text class="onode-init" x="${p.x}" y="${p.y+5}" text-anchor="middle">${esc(initials(n.name))}</text>
      <circle cx="${p.x+20}" cy="${p.y-20}" r="5" fill="${dot}" stroke="#0c0f17" stroke-width="1.5"/>
      <text class="onode-name" x="${p.x}" y="${p.y+48}" text-anchor="middle">${esc(n.name)}</text>
      <text class="onode-role" x="${p.x}" y="${p.y+62}" text-anchor="middle">${esc(n.role)}</text>
    </g>`;
  }).join('');
  $('office').innerHTML = `
    <defs><marker id="oarrow" markerWidth="9" markerHeight="9" refX="30" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4a5570"/></marker></defs>
    ${edges}${cells}` || '<text x="20" y="30" class="onode-name">нет агентов</text>';

  // side activity panel (compact)
  let items = [];
  try { items = await (await fetch('/api/activity?category=all&limit=14')).json(); } catch(e) {}
  $('officeFeed').innerHTML = items.map(i => `
    <div class="fi ${esc(i.category)}">
      <div class="ico">${({tasks:'📋',thoughts:'💭',system:'⚙️'})[i.category] || '•'}</div>
      <div class="body">
        <div class="head"><span class="who">${esc(i.actor || 'система')}</span>
          <span class="verb">${esc(i.verb || i.type)}</span></div>
        ${i.text ? `<div class="txt">${esc(i.text)}</div>` : ''}
      </div>
    </div>`).join('') || '<div class="muted">пока тихо</div>';
}

// ---- activity feed ---------------------------------------------------------
let curCat = 'all';
const CAT_ICON = { tasks:'📋', thoughts:'💭', system:'⚙️' };
function setCat(c) {
  curCat = c;
  document.querySelectorAll('.filt').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
  loadActivity();
}
function fmtTime(iso) {
  try { return new Date(iso + 'Z').toLocaleString('ru-RU', {hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}); }
  catch(e) { return iso; }
}
async function loadActivity() {
  let items = [];
  try { items = await (await fetch(`/api/activity?category=${curCat}&limit=120`)).json(); } catch(e) {}
  $('feed').innerHTML = items.map(i => `
    <div class="fi ${esc(i.category)}">
      <div class="ico">${CAT_ICON[i.category] || '•'}</div>
      <div class="body">
        <div class="head">
          <span class="who">${esc(i.actor || 'система')}</span>
          <span class="verb">${esc(i.verb || i.type)}</span>
          ${i.task_id ? `<span class="pill">#${i.task_id}</span>` : ''}
        </div>
        ${i.text ? `<div class="txt">${esc(i.text)}</div>` : ''}
      </div>
      <div class="when">${fmtTime(i.ts)}</div>
    </div>`).join('') || '<div class="muted">пока пусто</div>';
}

// ---- agents table ----------------------------------------------------------
async function load() {
  const agents = await (await fetch(API)).json();
  $('count').textContent = `· ${agents.length} агентов`;
  $('rows').innerHTML = agents.map(a => {
    const perms = Object.keys(a.permissions || {});
    const pills = perms.length ? perms.map(p => `<span class="pill">${esc(p)}</span>`).join('') : '<span class="muted">—</span>';
    const status = a.enabled ? '<span class="badge-on">● включён</span>' : '<span class="badge-off">○ выключен</span>';
    return `<tr>
      <td><code>${esc(a.slug)}</code></td>
      <td>${esc(a.name)}</td>
      <td class="muted">${esc(a.role)}</td>
      <td class="muted">${esc(a.model) || '<span class="muted">дефолт</span>'}</td>
      <td>${pills}</td>
      <td>${status}</td>
      <td class="row-actions" style="white-space:nowrap">
        <button onclick="openForm('${esc(a.slug)}')">✎</button>
        <button class="danger" onclick="quickDelete('${esc(a.slug)}')">🗑</button>
      </td></tr>`;
  }).join('');
}

// ---- board (kanban) --------------------------------------------------------
const STATUSES = [
  ['new','Новые'], ['in_progress','В работе'], ['blocked','Заблок.'],
  ['review','Ревью'], ['done','Готово'], ['cancelled','Отменено'],
];
async function loadBoard() {
  let tasks = [];
  try { tasks = await (await fetch('/api/tasks')).json(); } catch(e) {}
  $('taskCount').textContent = `· ${tasks.length} задач`;
  const byStatus = {}; STATUSES.forEach(([k]) => byStatus[k] = []);
  tasks.forEach(t => (byStatus[t.status] || (byStatus[t.status]=[])).push(t));
  $('board').innerHTML = STATUSES.map(([k,label]) => {
    const items = byStatus[k] || [];
    const cards = items.map(t => `
      <div class="card" onclick="openTimeline(${t.id})">
        <div class="t">${esc(t.title) || '(без названия)'}</div>
        <div class="meta">
          <span>#${t.id}</span>
          ${t.owner ? `<span class="pill">${esc(t.owner)}</span>` : ''}
          ${t.subtasks ? `<span>↳ ${t.subtasks}</span>` : ''}
        </div>
      </div>`).join('') || '<div class="muted" style="padding:6px">—</div>';
    return `<div class="col"><h4>${label}<span>${items.length}</span></h4>${cards}</div>`;
  }).join('');
}

// ---- timeline drawer -------------------------------------------------------
async function openTimeline(id) {
  $('tlTitle').textContent = `Задача #${id}`;
  $('tlMeta').textContent = 'загрузка…';
  $('tlList').innerHTML = '';
  $('drawer').classList.add('open');
  $('drawer').dataset.task = id;
  try {
    const [task, events] = await Promise.all([
      (await fetch(`/api/tasks/${id}`)).json(),
      (await fetch(`/api/tasks/${id}/events`)).json(),
    ]);
    $('tlTitle').textContent = `#${id} · ${task.title || ''}`;
    $('tlMeta').textContent = `статус: ${task.status} · владелец: ${task.owner || '—'} · создал: ${task.created_by || 'user'}`;
    $('tlList').innerHTML = events.map(e => {
      const p = e.payload || {};
      const extra = [p.to && `→ ${p.to}`, p.helper && `helper ${p.helper}`, p.status, p.reason]
        .filter(Boolean).map(esc).join(' · ');
      return `<li><span class="ty">${esc(e.type)}</span>
        <span class="who">${esc(e.actor || 'system')}</span>
        ${extra ? `· ${extra}` : ''}
        <div class="muted" style="font-size:11px">${esc(e.ts)}</div></li>`;
    }).join('') || '<li class="muted">нет событий</li>';
  } catch(e) { $('tlMeta').textContent = 'ошибка загрузки'; }
}
function closeDrawer() { $('drawer').classList.remove('open'); $('drawer').dataset.task = ''; }

// ---- interaction graph (SVG, circle layout) --------------------------------
async function loadGraph() {
  let data = {nodes:[], edges:[]};
  try { data = await (await fetch('/api/graph')).json(); } catch(e) {}
  const svg = $('graph'); const W=1000, H=420, cx=W/2, cy=H/2, R=160;
  const nodes = data.nodes || [];
  const pos = {};
  nodes.forEach((n, i) => {
    const a = (i / Math.max(1,nodes.length)) * 2*Math.PI - Math.PI/2;
    pos[n.slug] = { x: cx + R*Math.cos(a), y: cy + R*Math.sin(a), name: n.name };
  });
  const maxc = Math.max(1, ...(data.edges||[]).map(e => e.count));
  const edgesSvg = (data.edges||[]).map(e => {
    const a = pos[e.from], b = pos[e.to]; if (!a||!b) return '';
    const w = 1 + 5*(e.count/maxc);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    return `<line class="gedge" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
            stroke-width="${w.toFixed(1)}" marker-end="url(#arrow)"/>
            <text class="gedge-label" x="${mx}" y="${my}">${e.accepted}/${e.count}</text>`;
  }).join('');
  const nodesSvg = nodes.map(n => {
    const p = pos[n.slug];
    const cls = n.slug === 'ceo' ? 'gnode ceo' : 'gnode';
    return `<circle class="${cls}" cx="${p.x}" cy="${p.y}" r="22"/>
            <text class="glabel" x="${p.x}" y="${p.y+34}" text-anchor="middle">${esc(n.slug)}</text>`;
  }).join('');
  svg.innerHTML = `
    <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="26" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="var(--muted)"/></marker></defs>
    ${edgesSvg}${nodesSvg}` || '<text x="20" y="30" class="glabel">нет данных</text>';
}

// ---- live WebSocket --------------------------------------------------------
let ws, refreshTimer;
function setLive(on) {
  $('liveDot').className = 'dot ' + (on ? 'on' : 'off');
  $('liveTxt').textContent = on ? 'live' : 'offline';
}
function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => {
    if (curView === 'board') { loadBoard(); loadGraph(); }
    if (curView === 'activity') loadActivity();
    if (curView === 'office') loadOffice();
    const open = $('drawer').classList.contains('open');
    if (open && $('drawer').dataset.task) openTimeline(Number($('drawer').dataset.task));
  }, 400);
}
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/events`);
  ws.onopen = () => setLive(true);
  ws.onclose = () => { setLive(false); setTimeout(connectWS, 2000); };
  ws.onerror = () => ws.close();
  ws.onmessage = () => scheduleRefresh();
}

// ---- agent form (create/edit/delete) ---------------------------------------
function setPerms(perms) {
  perms = perms || {};
  $('p_can_edit_files').checked = perms.can_edit_files === 'true';
  $('p_can_run_shell').checked = perms.can_run_shell === 'true';
  $('p_can_edit_others_code').checked = perms.can_edit_others_code === 'true';
  $('p_can_modify_agents').checked = perms.can_modify_agents === 'true';
  $('p_proactive').checked = perms.proactive === 'true';
  $('f_delegate').value = (perms.delegate_to || '').replace(/^"|"$/g, '');
}
function collectPerms() {
  const p = {};
  if ($('p_can_edit_files').checked) p.can_edit_files = 'true';
  if ($('p_can_run_shell').checked) p.can_run_shell = 'true';
  if ($('p_can_edit_others_code').checked) p.can_edit_others_code = 'true';
  if ($('p_can_modify_agents').checked) p.can_modify_agents = 'true';
  if ($('p_proactive').checked) p.proactive = 'true';
  const d = $('f_delegate').value.trim();
  if (d) p.delegate_to = d;
  return p;
}
async function openForm(slug) {
  $('formErr').textContent = '';
  editingSlug = slug || null;
  $('formTitle').textContent = slug ? `Агент: ${slug}` : 'Новый агент';
  $('deleteBtn').style.display = slug ? 'inline-block' : 'none';
  $('f_slug').disabled = !!slug;
  if (slug) {
    const a = await (await fetch(`${API}/${slug}`)).json();
    $('f_slug').value = a.slug; $('f_name').value = a.name; $('f_role').value = a.role;
    $('f_model').value = a.model || ''; $('f_prompt').value = a.system_prompt || '';
    $('f_obligation').value = a.obligation || ''; $('f_tg_user').value = a.telegram_username || '';
    $('f_tg_token').value = '';
    $('f_tg_token').placeholder = a.has_token
      ? 'токен задан — оставьте пустым, чтобы не менять'
      : 'вставьте токен от @BotFather';
    $('f_enabled').checked = !!a.enabled;
    setPerms(a.permissions);
  } else {
    ['f_slug','f_name','f_role','f_model','f_prompt','f_obligation','f_delegate','f_tg_user','f_tg_token']
      .forEach(id => $(id).value = '');
    $('f_enabled').checked = true; setPerms({});
  }
  $('overlay').classList.add('open');
}
function closeForm() { $('overlay').classList.remove('open'); }
async function onSave() {
  const body = {
    slug: $('f_slug').value.trim(), name: $('f_name').value.trim(),
    role: $('f_role').value.trim(), model: $('f_model').value.trim(),
    system_prompt: $('f_prompt').value, obligation: $('f_obligation').value.trim(),
    telegram_username: $('f_tg_user').value.trim(), enabled: $('f_enabled').checked,
    permissions: collectPerms(),
  };
  const token = $('f_tg_token').value.trim();
  if (token) body.telegram_token = token;
  let res;
  if (editingSlug) {
    res = await fetch(`${API}/${editingSlug}`, {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  } else {
    res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  }
  if (!res.ok) { const e = await res.json().catch(()=>({})); $('formErr').textContent = e.detail || 'Ошибка сохранения'; return; }
  closeForm(); load();
}
async function onDelete() {
  if (!editingSlug || !confirm(`Удалить агента «${editingSlug}»?`)) return;
  await fetch(`${API}/${editingSlug}`, {method:'DELETE'});
  closeForm(); load();
}
async function quickDelete(slug) {
  if (!confirm(`Удалить агента «${slug}»?`)) return;
  await fetch(`${API}/${slug}`, {method:'DELETE'}); load();
}

load();
connectWS();
</script>
